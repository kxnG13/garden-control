<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Control Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f4f8; color: #333; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .status-bar { margin-bottom: 20px; padding: 10px; border-radius: 10px; font-weight: bold; }
        .online { background: #d4edda; color: #155724; }
        .offline { background: #f8d7da; color: #721c24; }
        .zone-card { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-on { background: #28a745; color: white; margin-right: 5px; }
        .btn-off { background: #dc3545; color: white; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="container">
    <h2>🌳 สวนของ kxnG13</h2>
    <div id="status-box" class="status-bar offline">สถานะ: กำลังเชื่อมต่อ... ⏳</div>
    
    <div id="controls">
        </div>
</div>

<script>
    // --- ตั้งค่าให้ตรงกับ ESP32 ---
    const MQTT_HOST = "broker.hivemq.com";
    const MQTT_PORT = 8000; // WebSocket Port
    const TOPIC_PREFIX = "kxnG13/garden/zone/"; 

    const client = new Paho.MQTT.Client(MQTT_HOST, Number(MQTT_PORT), "web_client_" + Math.random().toString(16).substr(2, 8));

    // เมื่อเชื่อมต่อสำเร็จ
    client.onConnect = () => {
        const box = document.getElementById('status-box');
        box.innerText = "สถานะ: ออนไลน์ ✅";
        box.className = "status-bar online";
    };

    // เมื่อการเชื่อมต่อหลุด
    client.onConnectionLost = (responseObject) => {
        const box = document.getElementById('status-box');
        box.innerText = "สถานะ: การเชื่อมต่อหลุด ❌";
        box.className = "status-bar offline";
        setTimeout(connectMQTT, 3000); // พยายามเชื่อมต่อใหม่ใน 3 วินาที
    };

    function connectMQTT() {
        client.connect({
            onSuccess: client.onConnect,
            onFailure: (err) => {
                console.log("Connect failed:", err);
                setTimeout(connectMQTT, 5000);
            },
            useSSL: false, // ถ้าหน้าเว็บเป็น https บางครั้งต้องสลับเป็น true/false ลองดูครับ
            timeout: 3
        });
    }

    function sendCmd(zone, state) {
        if (client.isConnected()) {
            const message = new Paho.MQTT.Message(state.toString());
            message.destinationName = TOPIC_PREFIX + zone;
            client.send(message);
            console.log("Sent:", TOPIC_PREFIX + zone, "Value:", state);
        } else {
            alert("กรุณารอการเชื่อมต่อสักครู่...");
        }
    }

    // สร้างปุ่มกด 6 โซน
    const zones = ["หน้าบ้าน", "สวนกล้วยไม้", "แปลงผัก 1", "แปลงผัก 2", "ไม้ผล", "รั้วกินได้"];
    let html = "";
    zones.forEach((name, i) => {
        html += `
        <div class="zone-card">
            <span>${name}</span>
            <div>
                <button class="btn-on" onclick="sendCmd(${i+1}, 1)">เปิด</button>
                <button class="btn-off" onclick="sendCmd(${i+1}, 0)">ปิด</button>
            </div>
        </div>`;
    });
    document.getElementById('controls').innerHTML = html;

    // เริ่มการเชื่อมต่อ
    connectMQTT();
</script>

</body>
</html>
