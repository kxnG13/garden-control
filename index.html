<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #2c3e50; color: white; }
        .card { background: #34495e; margin: 10px auto; padding: 15px; width: 80%; border-radius: 10px; }
        button { padding: 10px 25px; margin: 5px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .on { background: #2ecc71; color: white; }
        .off { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <h1>🌿 สวนของ kxnG13</h1>
    <div id="status">กำลังเชื่อมต่อ...</div>
    <div id="app"></div>

    <script>
        const baseTopic = "kxnG13/garden/zone/";
        const client = new Paho.MQTT.Client("broker.hivemq.com", 8000, "web_" + Math.random());
        client.connect({ onSuccess: () => { document.getElementById('status').innerText = "ออนไลน์ ✅"; }});

        function send(z, s) {
            let msg = new Paho.MQTT.Message(s.toString());
            msg.destinationName = baseTopic + z;
            client.send(msg);
        }

        let html = "";
        for(let i=1; i<=6; i++) {
            html += `<div class="card">
                <span>โซนที่ ${i}</span><br><br>
                <button class="on" onclick="send(${i}, 1)">เปิดน้ำ</button>
                <button class="off" onclick="send(${i}, 0)">ปิดน้ำ</button>
            </div>`;
        }
        document.getElementById('app').innerHTML = html;
    </script>
</body>
</html>
