<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Elite | Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Prompt:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #d4af37; /* Gold */
            --text: #ffffff;
            --text-dim: #888;
            --green: #2ecc71;
            --red: #e74c3c;
        }

        body {
            font-family: 'Inter', 'Prompt', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, var(--bg));
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 5px 15px;
            border-radius: 20px;
            background: #222;
            font-size: 0.8em;
            border: 1px solid #333;
            margin-top: 10px;
        }

        .dot { height: 8px; width: 8px; border-radius: 50%; margin-right: 8px; background: #555; }
        .dot.online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .container { max-width: 900px; margin: auto; padding: 20px; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .info-card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #222;
            text-align: center;
        }

        .zone-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--accent); }

        .card-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--accent);
        }

        .schedule-input {
            margin: 15px 0;
            background: #222;
            padding: 10px;
            border-radius: 10px;
        }

        input[type="time"] {
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 1.1em;
            width: 100%;
            outline: none;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #333;
            cursor: pointer;
            font-weight: 600;
            background: transparent;
            color: var(--text);
            transition: 0.2s;
        }

        .btn-on:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .btn-off:hover { background: var(--red); color: white; border-color: var(--red); }

        .auto-banner {
            background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 4px solid var(--accent);
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-weight: 200; letter-spacing: 4px;">GARDEN ELITE</h1>
    <div class="status-pill">
        <div id="dot" class="dot"></div>
        <span id="status-text">SYSTEM STANDBY</span>
    </div>
</header>

<div class="container">
    <div class="auto-banner">
        ✨ <b>Morning Routine:</b> ระบบจะทำงานอัตโนมัติตั้งแต่ 06:00 น. (โซน 1-6 ต่อเนื่องโซนละ 10 นาที)
    </div>

    <div class="info-grid">
        <div class="info-card">
            <div style="color:var(--text-dim); font-size: 0.8em;">DATE</div>
            <div id="date" style="font-size: 1.1em;">-</div>
        </div>
        <div class="info-card">
            <div style="color:var(--text-dim); font-size: 0.8em;">TIME</div>
            <div id="time" style="font-size: 1.1em; color: var(--accent);">00:00</div>
        </div>
    </div>

    <div id="zone-container" class="zone-grid"></div>
</div>

<script>
    const MQTT_HOST = "broker.hivemq.com";
    const MQTT_PORT = 8884;
    const TOPIC = "kxnG13/garden/zone/";
    const client = new Paho.MQTT.Client(MQTT_HOST, Number(MQTT_PORT), "web_" + Math.random().toString(16).substr(2, 5));

    function updateClock() {
        const now = new Date();
        document.getElementById('date').innerText = now.toLocaleDateString('th-TH', {day:'2-digit', month:'short'});
        document.getElementById('time').innerText = now.toLocaleTimeString('th-TH', {hour12:false});
        checkSchedules(now.getHours(), now.getMinutes());
    }
    setInterval(updateClock, 1000);

    function connect() {
        client.connect({
            onSuccess: () => {
                document.getElementById('dot').className = 'dot online';
                document.getElementById('status-text').innerText = 'SYSTEM ONLINE';
            },
            onFailure: () => setTimeout(connect, 5000),
            useSSL: true
        });
    }

    function send(z, s) {
        if (!client.isConnected()) return;
        const m = new Paho.MQTT.Message(s.toString());
        m.destinationName = TOPIC + z;
        client.send(m);
    }

    const zones = ["โซนหน้าบ้าน", "สวนกล้วยไม้", "แปลงผัก A", "แปลงผัก B", "โซนไม้ผล", "แนวรั้ว"];
    let html = "";
    zones.forEach((name, i) => {
        html += `
            <div class="card">
                <div class="card-title">${name}</div>
                <div style="color:var(--text-dim); font-size: 0.8em;">Zone Control 0${i+1}</div>
                <div class="schedule-input">
                    <label style="font-size:0.7em; color:var(--accent)">CUSTOM TIMER</label>
                    <input type="time" id="t-${i+1}">
                </div>
                <div class="btn-group">
                    <button class="btn-on" onclick="send(${i+1}, 1)">OPEN</button>
                    <button class="btn-off" onclick="send(${i+1}, 0)">CLOSE</button>
                </div>
            </div>`;
    });
    document.getElementById('zone-container').innerHTML = html;

    let schedules = {};
    document.querySelectorAll('input[type="time"]').forEach(input => {
        input.onchange = (e) => schedules[input.id.split('-')[1]] = e.target.value;
    });

    function checkSchedules(h, m) {
        const now = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        for (let z in schedules) {
            if (schedules[z] === now) {
                send(z, 1);
                delete schedules[z];
                document.getElementById(`t-${z}`).value = "";
            }
        }
    }

    client.onConnectionLost = () => {
        document.getElementById('dot').className = 'dot';
        document.getElementById('status-text').innerText = 'RECONNECTING...';
        connect();
    };

    connect();
</script>
</body>
</html>
