<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Garden Elite Minimal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

<style>

:root{

    --bg:#f4f6f8;
    --card:#ffffff;

    --line:#e5e7eb;

    --accent:#7ba88d;
    --accent-soft:#9cc9ae;

    --text:#1f2937;
    --muted:#94a3b8;

    --green:#22c55e;
    --red:#ef4444;

    --shadow:0 8px 30px rgba(0,0,0,.05);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Inter','Prompt',sans-serif;

    background:
        linear-gradient(
            180deg,
            #f8fafc 0%,
            #eef2f7 100%
        );

    min-height:100vh;

    color:var(--text);

    padding:28px;
}

.main{

    max-width:1300px;

    margin:auto;
}

/* HEADER */

.topbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    flex-wrap:wrap;

    gap:20px;

    margin-bottom:30px;
}

.brand{

    display:flex;

    align-items:center;

    gap:16px;
}

.logo{

    width:60px;
    height:60px;

    border-radius:20px;

    background:white;

    display:flex;

    justify-content:center;
    align-items:center;

    font-size:28px;

    box-shadow:var(--shadow);
}

.brand-text h1{

    font-size:28px;

    font-weight:700;

    letter-spacing:3px;
}

.brand-text p{

    color:var(--muted);

    margin-top:4px;

    font-size:13px;
}

/* STATUS */

.live-status{

    display:flex;

    align-items:center;

    gap:10px;

    background:rgba(255,255,255,.8);

    border:1px solid white;

    padding:14px 18px;

    border-radius:18px;

    box-shadow:var(--shadow);
}

.status-dot{

    width:10px;
    height:10px;

    border-radius:50%;

    background:#cbd5e1;
}

.status-dot.active{

    background:var(--green);

    box-shadow:0 0 10px rgba(34,197,94,.4);
}

.live-status span{

    color:#475569;

    font-size:13px;
}

/* DASHBOARD */

.dashboard{

    display:grid;

    grid-template-columns:1.1fr .9fr;

    gap:24px;

    margin-bottom:28px;
}

.hero-card,
.mini-card{

    background:rgba(255,255,255,.8);

    border:1px solid white;

    border-radius:28px;

    padding:28px;

    box-shadow:var(--shadow);
}

.hero-title{

    color:var(--accent);

    font-size:13px;

    letter-spacing:2px;

    margin-bottom:18px;
}

.clock{

    font-size:54px;

    font-weight:700;
}

.date{

    margin-top:10px;

    color:var(--muted);

    font-size:15px;
}

.system-box{

    display:grid;

    gap:20px;
}

.mini-card h3{

    color:var(--accent);

    font-size:12px;

    margin-bottom:10px;
}

.big{

    font-size:30px;

    font-weight:700;
}

/* GRID */

.zone-grid{

    display:grid;

    grid-template-columns:
        repeat(auto-fit,minmax(340px,1fr));

    gap:22px;
}

/* CARD */

.card{

    background:rgba(255,255,255,.9);

    border:1px solid var(--line);

    border-radius:24px;

    padding:26px;

    box-shadow:var(--shadow);

    transition:.25s;
}

.card:hover{

    transform:translateY(-4px);
}

.zone-top{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    margin-bottom:22px;
}

.zone-name{

    font-size:22px;

    font-weight:600;
}

.zone-sub{

    color:var(--muted);

    margin-top:6px;

    font-size:12px;
}

.zone-icon{

    width:52px;
    height:52px;

    border-radius:16px;

    background:#f1f5f9;

    display:flex;

    justify-content:center;
    align-items:center;

    font-size:22px;
}

/* TIMER */

.timer-box{

    background:#f8fafc;

    border:1px solid #edf2f7;

    border-radius:20px;

    padding:18px;

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:14px;
}

.input-group label{

    display:block;

    margin-bottom:8px;

    color:var(--accent);

    font-size:11px;
}

input[type="time"]{

    width:100%;

    background:white;

    border:1px solid #e2e8f0;

    border-radius:14px;

    padding:14px;

    outline:none;

    font-size:15px;

    color:var(--text);
}

input[type="time"]:focus{

    border-color:var(--accent);
}

/* BUTTONS */

.btn-group{

    display:flex;

    gap:12px;

    margin-top:22px;
}

button{

    flex:1;

    border:none;

    cursor:pointer;

    border-radius:16px;

    padding:15px;

    font-size:14px;

    font-weight:600;

    transition:.25s;
}

.btn-on{

    background:var(--accent);

    color:white;
}

.btn-on:hover{

    background:var(--accent-soft);
}

.btn-off{

    background:white;

    color:#475569;

    border:1px solid #dbe2ea;
}

.btn-off:hover{

    border-color:#fecaca;

    color:#ef4444;
}

/* ACTIVE BUTTON */

.btn-on.active{

    background:#22c55e !important;

    color:white;

    box-shadow:0 0 15px rgba(34,197,94,.35);
}

.btn-off.active{

    background:#ef4444 !important;

    color:white;

    border-color:#ef4444;

    box-shadow:0 0 15px rgba(239,68,68,.25);
}

/* SCHEDULE */

.schedule{

    margin-top:18px;

    background:#f8fafc;

    border:1px solid #edf2f7;

    border-radius:16px;

    padding:14px;

    display:flex;

    justify-content:space-between;

    align-items:center;
}

.schedule small{

    color:var(--muted);

    font-size:11px;
}

.schedule strong{

    color:var(--accent);

    font-size:13px;
}

/* FOOTER */

footer{

    text-align:center;

    margin-top:45px;

    color:#94a3b8;

    font-size:12px;
}

/* MOBILE */

@media(max-width:900px){

    .dashboard{
        grid-template-columns:1fr;
    }

    .clock{
        font-size:42px;
    }

    .zone-grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="main">

    <!-- HEADER -->

    <div class="topbar">

        <div class="brand">

            <div class="logo">
                🌿
            </div>

            <div class="brand-text">

                <h1>GARDEN ELITE</h1>

                <p>SMART IRRIGATION SYSTEM</p>

            </div>

        </div>

        <div class="live-status">

            <div id="status-dot" class="status-dot"></div>

            <span id="status-text">
                CONNECTING...
            </span>

        </div>

    </div>

    <!-- DASHBOARD -->

    <div class="dashboard">

        <div class="hero-card">

            <div class="hero-title">
                SYSTEM TIME
            </div>

            <div class="clock" id="current-time">
                00:00:00
            </div>

            <div class="date" id="current-date">
                -
            </div>

        </div>

        <div class="system-box">

            <div class="mini-card">

                <h3>ACTIVE ZONES</h3>

                <div class="big">
                    06
                </div>

            </div>

            <div class="mini-card">

                <h3>NETWORK</h3>

                <div class="big" style="font-size:20px">
                    MQTT SECURE
                </div>

            </div>

        </div>

    </div>

    <!-- ZONES -->

    <div class="zone-grid" id="zone-display"></div>

    <footer>
        PROFESSIONAL SMART WATER MANAGEMENT
    </footer>

</div>

<script>

/* MQTT */

const MQTT_HOST = "broker.hivemq.com";
const MQTT_PORT = 8884;

const BASE_TOPIC = "kxnG13/garden/zone/";

const client = new Paho.MQTT.Client(
    MQTT_HOST,
    Number(MQTT_PORT),
    "web_minimal_" +
    Math.random().toString(16).substr(2,5)
);

/* ZONES */

const zones = [

    {name:"หน้าบ้าน", icon:"🏡"},
    {name:"สวนกล้วยไม้", icon:"🌸"},
    {name:"แปลงผัก 01", icon:"🥬"},
    {name:"แปลงผัก 02", icon:"🌱"},
    {name:"ไม้ผล", icon:"🍊"},
    {name:"แนวรั้ว", icon:"🌿"}
];

let schedules = {};

/* INIT UI */

function initUI(){

    let html = "";

    zones.forEach((z,i)=>{

        const id = i + 1;

        html += `

        <div class="card">

            <div class="zone-top">

                <div>

                    <div class="zone-name">
                        ${z.name}
                    </div>

                    <div class="zone-sub">
                        VALVE UNIT 0${id}
                    </div>

                </div>

                <div class="zone-icon">
                    ${z.icon}
                </div>

            </div>

            <div class="timer-box">

                <div class="input-group">

                    <label>
                        START TIME
                    </label>

                    <input
                        type="time"
                        id="on-${id}"
                        onchange="updateSchedule(${id})"
                    >

                </div>

                <div class="input-group">

                    <label>
                        END TIME
                    </label>

                    <input
                        type="time"
                        id="off-${id}"
                        onchange="updateSchedule(${id})"
                    >

                </div>

            </div>

            <div class="btn-group">

                <button
                    id="open-${id}"
                    class="btn-on"
                    onclick="toggleValve(${id},1)"
                >
                    OPEN
                </button>

                <button
                    id="close-${id}"
                    class="btn-off active"
                    onclick="toggleValve(${id},0)"
                >
                    CLOSE
                </button>

            </div>

            <div class="schedule">

                <small>
                    AUTOMATION
                </small>

                <strong id="tag-${id}">
                    NOT SET
                </strong>

            </div>

        </div>

        `;

        schedules[id] = {

            on:null,
            off:null
        };
    });

    document.getElementById(
        "zone-display"
    ).innerHTML = html;
}

/* DATE TIME */

function updateDateTime(){

    const now = new Date();

    document.getElementById(
        "current-time"
    ).innerText =
        now.toLocaleTimeString(
            'th-TH',
            {hour12:false}
        );

    document.getElementById(
        "current-date"
    ).innerText =
        now.toLocaleDateString(
            'th-TH',
            {
                weekday:'long',
                day:'numeric',
                month:'long',
                year:'numeric'
            }
        );

    checkAuto(
        now.getHours(),
        now.getMinutes()
    );
}

/* SCHEDULE */

function updateSchedule(id){

    const onVal =
        document.getElementById(
            `on-${id}`
        ).value;

    const offVal =
        document.getElementById(
            `off-${id}`
        ).value;

    schedules[id] = {

        on:onVal || null,
        off:offVal || null
    };

    const tag =
        document.getElementById(
            `tag-${id}`
        );

    if(onVal || offVal){

        tag.innerText =
            `${onVal || '--'} → ${offVal || '--'}`;

        tag.style.color =
            "#7ba88d";

    }else{

        tag.innerText = "NOT SET";

        tag.style.color =
            "#94a3b8";
    }
}

/* AUTO */

function checkAuto(h,m){

    const now =
        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;

    for(let id in schedules){

        if(schedules[id].on === now){

            toggleValve(id,1);
        }

        if(schedules[id].off === now){

            toggleValve(id,0);
        }
    }
}

/* MQTT CONNECT */

function connect(){

    client.connect({

        onSuccess:()=>{

            document.getElementById(
                'status-dot'
            ).classList.add('active');

            document.getElementById(
                'status-text'
            ).innerText =
                'CONNECTED';
        },

        onFailure:()=>{

            setTimeout(connect,5000);
        },

        useSSL:true
    });
}

/* SEND MQTT */

function publish(zone,state){

    if(!client.isConnected()) return;

    const msg =
        new Paho.MQTT.Message(
            state.toString()
        );

    msg.destinationName =
        BASE_TOPIC + zone;

    client.send(msg);
}

/* BUTTON ACTIVE */

function toggleValve(zone,state){

    publish(zone,state);

    const openBtn =
        document.getElementById(
            `open-${zone}`
        );

    const closeBtn =
        document.getElementById(
            `close-${zone}`
        );

    if(state == 1){

        openBtn.classList.add("active");

        closeBtn.classList.remove("active");

    }else{

        closeBtn.classList.add("active");

        openBtn.classList.remove("active");
    }
}

/* LOST CONNECTION */

client.onConnectionLost = ()=>{

    document.getElementById(
        'status-dot'
    ).classList.remove('active');

    document.getElementById(
        'status-text'
    ).innerText =
        'RECONNECTING...';

    connect();
};

/* START */

initUI();

connect();

setInterval(
    updateDateTime,
    1000
);

</script>
</body>
</html>
